name: MERN Docker CI/CD

on:
push:
branches:
- main

pull_request:
branches:
- main

jobs:
build-and-push:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  # -----------------------------
  # Backend
  # -----------------------------

  - name: Install Backend Dependencies
    working-directory: ./backend
    run: npm ci

  - name: Build Backend
    working-directory: ./backend
    run: npm run build --if-present

  # -----------------------------
  # Frontend
  # -----------------------------

  - name: Install Frontend Dependencies
    working-directory: ./frontend
    run: npm ci

  - name: Build Frontend
    working-directory: ./frontend
    run: npm run build

  - name: Run Frontend Lint
    working-directory: ./frontend
    run: npm run lint || true

  # -----------------------------
  # Docker Login
  # -----------------------------

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  # -----------------------------
  # Backend Docker Image
  # -----------------------------

  - name: Build Backend Docker Image
    run: |
      docker build -t vikashsharma0707/backend:latest ./backend

  - name: Push Backend Docker Image
    run: |
      docker push vikashsharma0707/backend:latest

  # -----------------------------
  # Frontend Docker Image
  # -----------------------------

  - name: Build Frontend Docker Image
    run: |
      docker build -t vikashsharma0707/frontend:latest ./frontend

  - name: Push Frontend Docker Image
    run: |
      docker push vikashsharma0707/frontend:latest
```
