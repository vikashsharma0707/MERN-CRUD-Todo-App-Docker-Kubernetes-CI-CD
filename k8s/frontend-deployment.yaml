apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: mern-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend

          image: vikashsharma0707/frontend:latest

          ports:
            - containerPort: 5173